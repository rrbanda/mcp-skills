schemaVersion: 2.2.2
metadata:
  name: mcp-skills-workspace
components:
  - name: tools
    container:
      image: quay.io/rbrhssa/mcp-skills:latest
      memoryLimit: 4Gi
      memoryRequest: 1Gi
      cpuLimit: "2"
      cpuRequest: 500m
      mountSources: true
      env:
        - name: GOOSE_PROVIDER
          value: openai
        - name: GOOSE_MODEL
          value: vllm-inference/gpt-oss-120b
        - name: OPENAI_HOST
          value: <YOUR_LLAMASTACK_URL>
        - name: OPENAI_BASE_PATH
          value: v1/chat/completions
        - name: OPENAI_API_KEY
          value: dummy
        - name: XDG_STATE_HOME
          value: /tmp/.local/state
        - name: SANDBOX_NAMESPACE
          value: sandbox-devspaces
        - name: SANDBOX_CONTAINER
          value: agent-sandbox
      endpoints:
        - name: fastmcp
          targetPort: 8000
          exposure: internal
commands:
  - id: install-goose-extension
    exec:
      component: tools
      commandLine: >-
        code --install-extension /opt/extensions/vscode-goose.vsix 2>/dev/null ||
        /checode/checode-linux-libc/bin/remote-cli/code --install-extension /opt/extensions/vscode-goose.vsix 2>/dev/null ||
        echo "Install manually: Extensions > ... > Install from VSIX > /opt/extensions/vscode-goose.vsix"
      workingDir: ${PROJECT_SOURCE}
  - id: create-sandbox-claim
    exec:
      component: tools
      commandLine: >-
        oc apply -f ${PROJECT_SOURCE}/demo/sandbox-claim.yaml 2>/dev/null &&
        echo "SandboxClaim created — waiting for pod..." &&
        sleep 5 &&
        SANDBOX_POD=$(oc get sandboxclaim my-agent-sandbox -n sandbox-devspaces -o jsonpath='{.status.sandboxName}' 2>/dev/null || echo "") &&
        if [ -n "$SANDBOX_POD" ]; then echo "Sandbox pod ready: $SANDBOX_POD"; else echo "Sandbox pending (WarmPool may not be active). Check: oc get sandbox -n sandbox-devspaces"; fi
      workingDir: ${PROJECT_SOURCE}
events:
  postStart:
    - install-goose-extension
projects:
  - name: mcp-skills
    git:
      remotes:
        origin: https://github.com/rrbanda/mcp-skills.git
