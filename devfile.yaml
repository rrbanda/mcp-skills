schemaVersion: 2.2.2
metadata:
  name: mcp-skills-workspace
components:
  - name: tools
    container:
      image: quay.io/rbrhssa/mcp-skills:latest
      memoryLimit: 4Gi
      memoryRequest: 1Gi
      cpuLimit: "2"
      cpuRequest: 500m
      mountSources: true
      env:
        - name: GOOSE_PROVIDER
          value: openai
        - name: GOOSE_MODEL
          value: vllm-inference/gpt-oss-120b
        - name: OPENAI_HOST
          value: http://localhost:9090
        - name: OPENAI_BASE_PATH
          value: v1/responses
        - name: OPENAI_API_KEY
          value: dummy
        - name: XDG_STATE_HOME
          value: /tmp/.local/state
      endpoints:
        - name: fastmcp
          targetPort: 8000
          exposure: internal
commands:
  - id: start-llm-proxy
    exec:
      component: tools
      commandLine: python3 llm_proxy.py
      workingDir: ${PROJECT_SOURCE}
  - id: install-goose-extension
    exec:
      component: tools
      commandLine: >-
        code --install-extension /opt/extensions/vscode-goose.vsix 2>/dev/null ||
        /checode/checode-linux-libc/bin/remote-cli/code --install-extension /opt/extensions/vscode-goose.vsix 2>/dev/null ||
        echo "Install manually: Extensions > ... > Install from VSIX > /opt/extensions/vscode-goose.vsix"
      workingDir: ${PROJECT_SOURCE}
projects:
  - name: mcp-skills
    git:
      remotes:
        origin: https://github.com/rrbanda/mcp-skills.git
