name: docs

on:
  push:
    branches:
    - main
    paths:
    - .github/workflows/docs.yml
    - site.yml
    - 'documentation/**'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout project
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Run antora
      uses: docker://antora/antora:3.1.10
      with:
        args: site.yml
    - name: Disable Jekyll
      run: touch gh-pages/.nojekyll
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@releases/v4
      with:
        token: "${{github.token}}"
        FOLDER: gh-pages
        BRANCH: gh-pages
        commit-message: "[docs] Publishing the docs for commit(s) ${{github.sha}}"
